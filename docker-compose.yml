services:
  searxng:
    image: searxng/searxng:latest
    container_name: betterclaw-searxng
    ports:
      - "18731:8080"
    volumes:
      - ./searxng/settings.yml:/etc/searxng/settings.yml:ro
    restart: unless-stopped

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: betterclaw-crawl4ai
    ports:
      - "18732:11235"
    shm_size: 1g
    restart: unless-stopped
