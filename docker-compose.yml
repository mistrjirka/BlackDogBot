services:
  searxng:
    image: searxng/searxng:latest
    container_name: blackdogbot-searxng
    ports:
      - "18731:8080"
    environment:
      - SEARXNG_BASE_URL=http://127.0.0.1:18731/
      - SEARXNG_SECRET=afac16c65ec435be5bbf10d0f1070193e298dcd32318567bed064bc1e5121e2c
      - BIND_ADDRESS=0.0.0.0:8080
    volumes:
      - ./searxng:/etc/searxng
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: blackdogbot-crawl4ai
    ports:
      - "18732:11235"
    environment:
      - CRAWL4AI_API_TOKEN=
    shm_size: 3g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 3
